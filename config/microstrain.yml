microstrain_inertial_driver:
  ros__parameters:
    # Port configurations
    # It is recommended to use the UDEV symlinks created by the driver install:
    # /dev/microstrain_main -> Main communication port (IMU/GNSS data, configuration)
    # /dev/microstrain_aux  -> Auxiliary communication port (RTCM inputs, NMEA outputs)
    port: "/dev/microstrain_main"
    baudrate: 115200
    # aux_port: "/dev/microstrain_aux"
    # aux_baudrate: 115200

    # RTK and NTRIP interface configurations
    rtk_dongle_enable: false      # Disables RTK status publishing
    ntrip_interface_enable: false  # Disables subscribing to /rtcm

    # NMEA Sentence configuration
    nmea_message_config: false
    gnss1_nmea_talker_id: 1
    gnss1_nmea_gga_data_rate: 0   # Disable GGA sentence output

